name: Build & Package Edge/Chrome Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check manifest version
        run: |
          grep '"manifest_version": 3' manifest.json

      - name: Validate extension structure
        run: |
          test -f manifest.json
          test -f sidepanel.html
          test -f sidepanel.js
          test -f background.js
          test -f styles.css
          test -d icons

      # �� tag �����滻 manifest.json �� version �ֶ�
      - name: Replace manifest version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$TAG_VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          cat manifest.json

      - name: Build (main branch)
        if: github.ref == 'refs/heads/main'
        run: echo "Build and validate only (main branch)"

      - name: Prepare extension package content (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          rm -rf package-temp
          mkdir -p package-temp/extension

          rsync -a ./ package-temp/extension/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'package-temp/' \
            --exclude '*.zip' \
            --exclude '*.md' \
            --exclude 'LICENSE'

      - name: Package Edge Extension (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd package-temp/extension
          zip -r ../../edge-extension-${{ github.ref_name }}.zip .

      - name: Package Chrome Extension (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd package-temp/extension
          zip -r ../../chrome-extension-${{ github.ref_name }}.zip .

      - name: Upload Edge Extension Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: edge-extension-${{ github.ref_name }}
          path: edge-extension-${{ github.ref_name }}.zip

      - name: Upload Chrome Extension Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ github.ref_name }}
          path: chrome-extension-${{ github.ref_name }}.zip

      - name: Create Release and Upload Assets (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            edge-extension-${{ github.ref_name }}.zip
            chrome-extension-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
