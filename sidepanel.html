<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 页面总结 - 侧边栏</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sidepanel-body">
  <div class="container">
    <!-- 顶部标题栏 -->
    <div class="header-row">
      <button id="history-btn" class="icon-btn" title="历史记录">📜</button>
      <h1>📄 AI 页面总结</h1>
      <div class="header-placeholder"></div>
    </div>

    <div class="provider-select">
      <label for="provider">选择 AI 模型：</label>
      <select id="provider">
        <option value="deepseek">DeepSeek</option>
        <option value="doubao">豆包 (Doubao)</option>
        <option value="ollama">Ollama (本地)</option>
        <option value="dockerai">Docker Desktop AI</option>
        <option value="koboldcpp">KoboldCpp (本地)</option>
        <option value="giteeai">Gitee AI</option>
      </select>
    </div>

    <button id="summarize-btn">🔄 总结当前页面</button>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>正在读取页面并总结...</span>
    </div>

    <div id="result" class="hidden">
      <h2>总结结果</h2>
      <div id="summary-content"></div>
      <button id="copy-btn">📋 复制</button>
      <span id="summary-timer" style="font-size:12px;color:#9ca3af;margin-left:8px;"></span>
    </div>

    <div id="error" class="hidden">
      <p id="error-message"></p>
    </div>

    <!-- 对话历史区域 -->
    <div id="chat-messages" class="hidden"></div>

    <!-- 底部对话输入框 -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="对页面内容提问..." rows="1"></textarea>
        <button id="chat-send-btn" title="发送">➤</button>
      </div>
      <div class="chat-footer-row">
        <a href="#" id="open-options">⚙️ 设置</a>
        <span id="chat-hint">Enter 发送 · Shift+Enter 换行</span>
      </div>
    </div>
  </div>

  <!-- 历史记录面板 -->
  <div id="history-panel" class="history-panel hidden">
    <div class="history-header">
      <button id="history-close-btn" class="icon-btn" title="关闭">✕</button>
      <h2>📜 历史记录</h2>
      <button id="history-clear-btn" class="icon-btn" title="清空全部">🗑️</button>
    </div>
    <div id="history-list" class="history-list">
      <!-- 历史记录项将动态插入 -->
    </div>
    <div id="history-empty" class="history-empty hidden">
      <p>暂无历史记录</p>
    </div>
  </div>

  <!-- 历史记录遮罩层 -->
  <div id="history-overlay" class="history-overlay hidden"></div>

  <!-- 确认对话框 -->
  <div id="confirm-dialog" class="confirm-dialog hidden">
    <div class="confirm-content">
      <p id="confirm-message">确定要执行此操作吗？</p>
      <div class="confirm-buttons">
        <button id="confirm-cancel-btn" class="btn-secondary">取消</button>
        <button id="confirm-ok-btn" class="btn-danger">确定</button>
      </div>
    </div>
  </div>

  <script src="history.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
