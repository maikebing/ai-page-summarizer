<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 页面总结器 - 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      color: #1f2937;
    }
    h1 { font-size: 22px; margin-bottom: 24px; }
    .section {
      margin-bottom: 24px;
      padding: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .section h2 {
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #059669;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>⚙️ AI 页面总结器 - 设置</h1>

  <div class="section">
    <h2>🤖 DeepSeek</h2>
    <label for="deepseek-key">API Key</label>
    <input type="password" id="deepseek-key" placeholder="sk-xxxxxxxxxxxxxxxx">
    <p class="hint">在 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek 开放平台</a> 获取</p>
    <label for="deepseek-model">模型</label>
    <select id="deepseek-model">
      <option value="deepseek-chat">deepseek-chat (V3)</option>
      <option value="deepseek-reasoner">deepseek-reasoner (R1)</option>
    </select>
  </div>

  <div class="section">
    <h2>🔥 豆包 (Doubao)</h2>
    <label for="doubao-key">API Key</label>
    <input type="password" id="doubao-key" placeholder="your-ark-api-key">
    <p class="hint">在 <a href="https://console.volcengine.com/ark" target="_blank">火山引擎 Ark 控制台</a> 获取</p>
    <label for="doubao-model">模型 / 推理接入点 (Endpoint ID)</label>
    <input type="text" id="doubao-model" placeholder="doubao-pro-256k 或你的 endpoint id">
    <p class="hint">填写模型名称或者你创建的推理接入点 ID</p>
  </div>

  <button id="save-btn">💾 保存设置</button>
  <p class="status hidden" id="status">✅ 设置已保存！</p>

  <script src="options.js"></script>
</body>
</html>
